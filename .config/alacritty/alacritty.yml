env:
    TERM: xterm-256color

window:
    startup_mode: Maximized
    padding:
        x: 0
        y: 0
    margin:
        x: 0
        y: 0
    opacity: 1

scrolling:
    history: 100000
    multiplier: 3

font:
    normal:
        family: "IosevkaTerm Nerd Font"
        style: Regular
    italic:
        family: "IosevkaTerm Nerd Font"
        style: Italic
    bold:
        family: "IosevkaTerm Nerd Font"
        style: Bold
    size: 18.0

cursor:
    style:
        shape: Block
        blinking: Always
    blink_interval: 500

colors:
    primary:
        background: "0x1d2021"
        foreground: "0xebdbb2"
    normal:
        black: "0x282828"
        red: "0xcc241d"
        green: "0x98971a"
        yellow: "0xd79921"
        blue: "0x458588"
        magenta: "0xb16286"
        cyan: "0x689d6a"
        white: "0xa89984"
    bright:
        black: "0x928374"
        red: "0xfb4934"
        green: "0xb8bb26"
        yellow: "0xfabd2f"
        blue: "0x83a598"
        magenta: "0xd3869b"
        cyan: "0x8ec07c"
        white: "0xebdbb2"
