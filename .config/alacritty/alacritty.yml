env:
    TERM: xterm-256color

window:
    startup_mode: Maximized
    padding:
        x: 0
        y: 0
    margin:
        x: 0
        y: 0
    opacity: 1
    decorations: buttonless

scrolling:
    history: 100000
    multiplier: 3

font:
    normal:
        family: 'Agave Nerd Font Mono'
        style: Regular
    italic:
        family: 'Agave Nerd Font Mono'
        style: Italic
    bold:
        family: 'Agave Nerd Font Mono'
        style: Bold
    size: 20.5

cursor:
    style:
        shape: Block
        blinking: Always
    blink_interval: 500

import:
    - ~/.config/alacritty/themes/nord.yml
